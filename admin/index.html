<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - MecanoRace</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0a0f;
            --bg-panel: rgba(20, 20, 30, 0.9);
            --primary: #00ffcc;
            --primary-glow: rgba(0, 255, 204, 0.5);
            --secondary: #ff00ff;
            --error: #ff3366;
            --text-main: #ffffff;
            --text-muted: #888899;
            --font-ui: 'Inter', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: var(--font-ui);
            min-height: 100vh;
            padding: 2rem;
        }

        h1, h2 {
            color: var(--primary);
            margin-bottom: 1rem;
            text-shadow: 0 0 10px var(--primary-glow);
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .panel {
            background: var(--bg-panel);
            padding: 2rem;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 2rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .hidden { display: none !important; }

        /* Forms */
        .input-group {
            margin-bottom: 1rem;
            display: flex;
            gap: 1rem;
        }

        input[type="password"], input[type="text"], textarea {
            width: 100%;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: var(--text-main);
            padding: 0.8rem;
            border-radius: 6px;
            font-family: var(--font-ui);
            outline: none;
        }
        
        textarea {
            resize: vertical;
            min-height: 80px;
        }

        input:focus, textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 5px var(--primary-glow);
        }

        .btn {
            padding: 0.8rem 1.5rem;
            background: var(--primary);
            color: var(--bg-dark);
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn:hover {
            box-shadow: 0 0 15px var(--primary-glow);
        }

        .btn-danger {
            background: var(--error);
            color: white;
        }
        
        .btn-danger:hover {
            box-shadow: 0 0 15px rgba(255, 51, 102, 0.5);
        }

        /* Lists */
        .item-list {
            list-style: none;
            margin-top: 1rem;
        }

        .item-list li {
            background: rgba(0,0,0,0.3);
            padding: 1rem;
            border: 1px solid rgba(255,255,255,0.05);
            margin-bottom: 0.5rem;
            border-radius: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
        }
        
        .text-preview {
            flex: 1;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
        }

        th, td {
            padding: 0.8rem;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        th { color: var(--secondary); }

        .back-btn {
            position: fixed;
            top: 1.5rem;
            left: 1.5rem;
            width: 44px;
            height: 44px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 1.5rem;
            transition: all 0.3s ease;
            z-index: 100;
        }

        .back-btn:hover {
            color: var(--primary);
            border-color: var(--primary);
            background: rgba(0, 255, 204, 0.1);
            box-shadow: 0 0 15px var(--primary-glow);
            transform: translateX(-5px);
        }
    </style>
</head>
<body>
    <a href="../index.html" class="back-btn" title="Volver al Juego">←</a>

<div class="container">
    <h1>MecanoRace - Panel Admin</h1>

    <!-- Admin Content -->
    <div id="admin-content">
        
        <!-- Textos -->
        <div class="panel">
            <h2>Gestión de Textos</h2>
            <div class="input-group">
                <textarea id="new-text" placeholder="Añadir un nuevo texto para la competición..."></textarea>
                <button class="btn" onclick="addText()">Añadir</button>
            </div>
            <ul id="texts-list" class="item-list"></ul>
            <button class="btn mt-2" onclick="resetDefaultTexts()" style="margin-top: 1rem;">Restaurar Textos por Defecto</button>
        </div>

        <!-- Leaderboard -->
        <div class="panel">
            <h2>Gestión del Ranking</h2>
            <button class="btn btn-danger" onclick="clearLeaderboard()" style="margin-bottom: 1rem;">Borrar TODO el Ranking</button>
            <table id="leaderboard-table">
                <thead>
                    <tr>
                        <th>Nombre</th>
                        <th>PPM</th>
                        <th>Precisión</th>
                        <th>Acción</th>
                    </tr>
                </thead>
                <tbody id="leaderboard-body"></tbody>
            </table>
        </div>
        
    </div>
</div>

<script>
    const defaultTexts = [
        "La tecnología no es nada. Lo importante es que tengas fe en la gente, que sean básicamente buenas e inteligentes, y si les das herramientas, harán cosas maravillosas con ellas.",
        "El diseño no es solo lo que se ve y lo que se siente. El diseño es cómo funciona. La innovación distingue a los líderes de los seguidores en el mundo moderno.",
        "Escribir rápido y sin errores es una habilidad esencial en la era digital. Cada pulsación en el teclado es un paso más hacia la eficiencia absoluta y el dominio de la máquina.",
        "En el vasto universo de la programación, la lógica y la creatividad convergen. Una mente aguda puede resolver problemas complejos escribiendo líneas de código que transforman ideas en realidad tangible.",
        "Las máquinas computacionales pueden procesar información a velocidades increíbles, pero todavía requieren de la intuición humana para guiar su inmenso poder hacia propósitos verdaderamente significativos y útiles."
    ];

    // Cargar datos al iniciar
    loadData();

    function loadData() {
        renderTexts();
        renderLeaderboard();
    }

    /* --- GESTIÓN DE TEXTOS --- */
    function getTexts() {
        let texts = JSON.parse(localStorage.getItem('mecanorace_texts'));
        if (!texts || !Array.isArray(texts) || texts.length === 0) {
            texts = defaultTexts;
            localStorage.setItem('mecanorace_texts', JSON.stringify(texts));
        }
        return texts;
    }

    function renderTexts() {
        const texts = getTexts();
        const list = document.getElementById('texts-list');
        list.innerHTML = '';
        texts.forEach((t, i) => {
            const li = document.createElement('li');
            li.innerHTML = `
                <div class="text-preview">${t}</div>
                <button class="btn btn-danger" onclick="deleteText(${i})">Borrar</button>
            `;
            list.appendChild(li);
        });
    }

    function addText() {
        const input = document.getElementById('new-text');
        const val = input.value.trim();
        if (val) {
            const texts = getTexts();
            texts.push(val);
            localStorage.setItem('mecanorace_texts', JSON.stringify(texts));
            input.value = '';
            renderTexts();
        }
    }

    function deleteText(index) {
        const texts = getTexts();
        if (texts.length <= 1) {
            return;
        }
        texts.splice(index, 1);
        localStorage.setItem('mecanorace_texts', JSON.stringify(texts));
        renderTexts();
    }

    function resetDefaultTexts() {
        localStorage.setItem('mecanorace_texts', JSON.stringify(defaultTexts));
        renderTexts();
    }

    /* --- GESTIÓN DE RANKING --- */
    function getLeaderboard() {
        return JSON.parse(localStorage.getItem('mecanorace_leaderboard')) || [];
    }

    function renderLeaderboard() {
        const lb = getLeaderboard();
        const tbody = document.getElementById('leaderboard-body');
        tbody.innerHTML = '';
        
        if (lb.length === 0) {
            tbody.innerHTML = '<tr><td colspan="4">No hay registros.</td></tr>';
            return;
        }

        lb.forEach((score, i) => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${score.name}</td>
                <td>${score.wpm}</td>
                <td>${score.accuracy}%</td>
                <td><button class="btn btn-danger" style="padding:0.3rem 0.8rem;" onclick="deleteScore(${i})">Borrar</button></td>
            `;
            tbody.appendChild(tr);
        });
    }

    function deleteScore(index) {
        const lb = getLeaderboard();
        lb.splice(index, 1);
        localStorage.setItem('mecanorace_leaderboard', JSON.stringify(lb));
        renderLeaderboard();
    }

    function clearLeaderboard() {
        localStorage.setItem('mecanorace_leaderboard', JSON.stringify([]));
        renderLeaderboard();
    }
</script>

</body>
</html>
